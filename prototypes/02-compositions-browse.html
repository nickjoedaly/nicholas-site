<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nicholas — Compositions</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0e1b2e;
  --navy-mid: #1a2d4a;
  --navy-light: #243b5c;
  --cream: #f5f0e8;
  --cream-dark: #e8e0d2;
  --cream-mid: #ece5d8;
  --gold: #c8963e;
  --gold-light: #d4a854;
  --gold-muted: #a07830;
  --gold-pale: #f0e6d0;
  --text-dark: #1a1a18;
  --text-mid: #5a5650;
  --text-light: #8a8580;
  --tag-bg: #eae5dc;
  --tag-color: #5a5650;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  color: var(--text-dark);
  background: var(--cream);
  -webkit-font-smoothing: antialiased;
}

/* ── Nav ── */
.nav {
  background: var(--navy);
  padding: 0 2.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
}
.nav-logo {
  font-family: 'Source Serif 4', serif;
  color: var(--cream);
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.02em;
  text-decoration: none;
}
.nav-logo span { color: var(--gold); }
.nav-links { display: flex; gap: 2rem; list-style: none; align-items: center; }
.nav-links a {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--cream-dark);
  text-decoration: none;
  opacity: 0.6;
  transition: opacity 0.2s;
}
.nav-links a:hover { opacity: 1; }
.nav-links a.active {
  opacity: 1;
  color: var(--gold);
  border-bottom: 1px solid var(--gold);
  padding-bottom: 2px;
}

/* ── Header Motif ── */
.header-motif {
  background: var(--navy);
  overflow: hidden;
  height: 16px;
  position: relative;
}
.header-motif svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
}

/* ── Hero Strip ── */
.hero-strip {
  background: var(--navy);
  padding: 2rem 2.5rem 2.5rem;
  border-bottom: 2px solid var(--gold);
}
.hero-strip h1 {
  font-family: 'Source Serif 4', serif;
  font-size: 34px;
  font-weight: 300;
  color: var(--cream);
  letter-spacing: -0.01em;
  margin-bottom: 0.5rem;
}
.hero-strip p {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--cream-dark);
  opacity: 0.6;
  letter-spacing: 0.04em;
}

/* ── Content ── */
.content {
  max-width: 1200px;
  margin: 0 auto;
  padding: 1.5rem 2rem 3rem;
}

/* ── Toolbar ── */
.toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
  gap: 1rem;
  flex-wrap: wrap;
}
.search-box {
  position: relative;
  flex: 1;
  max-width: 360px;
}
.search-box input {
  width: 100%;
  padding: 10px 14px 10px 36px;
  border: 1px solid var(--cream-dark);
  border-radius: 6px;
  background: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--text-dark);
  outline: none;
  transition: border-color 0.2s;
}
.search-box input:focus { border-color: var(--gold); }
.search-box::before {
  content: '\2315';
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  color: var(--text-light);
}
.view-toggle {
  display: flex;
  gap: 4px;
  background: white;
  border: 1px solid var(--cream-dark);
  border-radius: 6px;
  padding: 3px;
}
.view-btn {
  padding: 6px 14px;
  border: none;
  background: transparent;
  border-radius: 4px;
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-mid);
  transition: all 0.2s;
}
.view-btn.active { background: var(--navy); color: var(--cream); }
.sort-select {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 8px 12px;
  border: 1px solid var(--cream-dark);
  border-radius: 6px;
  background: white;
  color: var(--text-mid);
  cursor: pointer;
  outline: none;
}

/* ── Filter Bar ── */
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 1.5rem;
  align-items: center;
}
.filter-group {
  position: relative;
  display: inline-block;
}
.filter-group-btn {
  padding: 6px 14px;
  border: 1px solid var(--cream-dark);
  border-radius: 20px;
  background: white;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.03em;
  color: var(--text-mid);
  cursor: pointer;
  transition: all 0.2s;
}
.filter-group-btn:hover { border-color: var(--gold); color: var(--text-dark); }
.filter-group-btn.has-active {
  background: var(--gold-pale);
  border-color: var(--gold);
  color: var(--gold-muted);
}
.filter-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  background: white;
  border: 1px solid var(--cream-dark);
  border-radius: 8px;
  padding: 8px;
  min-width: 200px;
  z-index: 50;
  box-shadow: 0 4px 20px rgba(14,27,46,0.1);
}
.filter-dropdown.open {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.filter-chip {
  padding: 5px 12px;
  border-radius: 4px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  border: none;
  background: transparent;
  text-align: left;
  color: var(--text-mid);
}
.filter-chip:hover { background: var(--cream); }
.filter-chip.selected {
  font-weight: 500;
  background: var(--gold-pale);
  color: var(--gold-muted);
}

/* ── Active Filters ── */
.active-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 1rem;
}
.active-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.02em;
  cursor: pointer;
  background: var(--gold-pale);
  color: var(--gold-muted);
  transition: opacity 0.15s;
}
.active-tag:hover { opacity: 0.7; }
.active-tag .x { opacity: 0.5; font-size: 13px; }

/* ── Results Count ── */
.results-count {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-light);
  margin-bottom: 1rem;
  letter-spacing: 0.03em;
}

/* ── Composition Grid ── */
.comp-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}
.comp-card {
  background: white;
  border: 1px solid var(--cream-dark);
  border-radius: 8px;
  overflow: hidden;
  transition: border-color 0.2s, transform 0.2s;
  cursor: pointer;
}
.comp-card:hover {
  border-color: var(--gold);
  transform: translateY(-2px);
}
.card-header { padding: 1.25rem 1.25rem 0.75rem; }
.card-year {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-light);
  letter-spacing: 0.06em;
  margin-bottom: 4px;
}
.card-title {
  font-family: 'Source Serif 4', serif;
  font-size: 19px;
  font-weight: 600;
  color: var(--text-dark);
  margin-bottom: 2px;
  line-height: 1.3;
}
.card-subtitle {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--text-mid);
  margin-bottom: 10px;
}
.card-meta {
  display: flex;
  gap: 12px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text-light);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  padding: 0 1.25rem 0.75rem;
}
.card-tag {
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  padding: 2px 8px;
  border-radius: 3px;
  letter-spacing: 0.02em;
  background: var(--tag-bg);
  color: var(--tag-color);
}
.card-audio {
  border-top: 1px solid var(--cream-mid);
  padding: 10px 1.25rem;
  display: flex;
  align-items: center;
  gap: 10px;
}
.play-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1.5px solid var(--navy);
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
}
.play-btn:hover { background: var(--navy); }
.play-btn:hover .play-tri { border-left-color: var(--cream); }
.play-tri {
  width: 0; height: 0;
  border-top: 6px solid transparent;
  border-bottom: 6px solid transparent;
  border-left: 10px solid var(--navy);
  margin-left: 2px;
}
.waveform {
  flex: 1;
  height: 28px;
  display: flex;
  align-items: center;
  gap: 1.5px;
}
.wave-bar {
  width: 2px;
  background: var(--navy-light);
  border-radius: 1px;
  opacity: 0.25;
  transition: opacity 0.2s;
}
.comp-card:hover .wave-bar { opacity: 0.45; }
.audio-dur {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text-light);
  flex-shrink: 0;
}
.card-score-preview {
  border-top: 1px solid var(--cream-mid);
  padding: 10px 1.25rem;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-mid);
}
.score-icon { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; }
.score-lines { display: flex; flex-direction: column; gap: 2px; }
.score-line { width: 14px; height: 1px; background: var(--text-light); }
.license-badge {
  margin-left: auto;
  padding: 2px 8px;
  border-radius: 3px;
  background: var(--gold-pale);
  color: var(--gold-muted);
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.03em;
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .nav { padding: 0 1.5rem; }
  .hero-strip { padding: 1.5rem; }
  .hero-strip h1 { font-size: 26px; }
  .content { padding: 1rem 1rem 2rem; }
  .comp-grid { grid-template-columns: 1fr; }
  .toolbar { flex-direction: column; align-items: stretch; }
  .search-box { max-width: 100%; }
}
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-logo" href="#">Nicholas <span>Composer</span></a>
  <ul class="nav-links">
    <li><a href="#">works</a></li>
    <li><a href="#" class="active">catalog</a></li>
    <li><a href="#">about</a></li>
    <li><a href="#">commissions</a></li>
    <li><a href="#">contact</a></li>
  </ul>
</nav>

<div class="header-motif">
  <svg viewBox="0 0 1400 16" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <line x1="0" y1="3" x2="1400" y2="3" stroke="#f5f0e8" stroke-width="0.3" opacity="0.06"/>
    <line x1="0" y1="6" x2="1400" y2="6" stroke="#f5f0e8" stroke-width="0.3" opacity="0.06"/>
    <line x1="0" y1="9" x2="1400" y2="9" stroke="#f5f0e8" stroke-width="0.3" opacity="0.06"/>
    <line x1="0" y1="12" x2="1400" y2="12" stroke="#f5f0e8" stroke-width="0.3" opacity="0.06"/>
    <line x1="0" y1="15" x2="1400" y2="15" stroke="#f5f0e8" stroke-width="0.3" opacity="0.06"/>
    <ellipse cx="150" cy="9" rx="3" ry="2.2" fill="#c8963e" opacity="0.12"/>
    <line x1="153" y1="9" x2="153" y2="2" stroke="#c8963e" stroke-width="0.5" opacity="0.12"/>
    <ellipse cx="500" cy="6" rx="3" ry="2.2" fill="none" stroke="#c8963e" stroke-width="0.5" opacity="0.1"/>
    <ellipse cx="900" cy="12" rx="3" ry="2.2" fill="#c8963e" opacity="0.1"/>
    <line x1="903" y1="12" x2="903" y2="5" stroke="#c8963e" stroke-width="0.5" opacity="0.1"/>
    <ellipse cx="1250" cy="6" rx="3" ry="2.2" fill="none" stroke="#c8963e" stroke-width="0.5" opacity="0.08"/>
  </svg>
</div>

<div class="hero-strip">
  <h1>Compositions</h1>
  <p>Browse the catalog — filter by character, instrumentation, technique, and more</p>
</div>

<div class="content">
  <div class="toolbar">
    <div class="search-box">
      <input type="text" placeholder="Search by title, instrument, year..." id="searchInput" />
    </div>
    <div class="view-toggle">
      <button class="view-btn active" data-view="grid">Grid</button>
      <button class="view-btn" data-view="list">List</button>
    </div>
    <select class="sort-select" id="sortSelect">
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
      <option value="az">A — Z</option>
      <option value="duration">Duration</option>
    </select>
  </div>

  <div class="filter-bar" id="filterBar"></div>
  <div class="active-filters" id="activeFilters"></div>
  <div class="results-count" id="resultsCount"></div>
  <div class="comp-grid" id="compGrid"></div>
</div>

<script>
var compositions = [
  { title: "Meridian Lines", subtitle: "for string quartet and electronics", year: 2024, duration: "14:30", tags: {character:["Reflective","Sonorous"],tonality:["Modal"],tempo:["Slow"],technique:["Electronics"],instrumentation:["Chamber","Electronics"],difficulty:["Advanced"]}, license: "Licensing available", hasScore: true, hasAudio: true },
  { title: "Tectonic Hymn", subtitle: "for orchestra", year: 2023, duration: "22:15", tags: {character:["Propulsive","Energetic"],tonality:["Tonal"],tempo:["Varied"],technique:["Rhythmic"],instrumentation:["Orchestra"],difficulty:["Advanced"]}, license: "Score rental", hasScore: true, hasAudio: true },
  { title: "Five Ghazals", subtitle: "for soprano, oud, and cello", year: 2023, duration: "18:45", tags: {character:["Melodic","Mysterious"],tonality:["Non-Western"],tempo:["Medium"],technique:[],instrumentation:["Chamber","Voice"],difficulty:["Intermediate"]}, license: "Licensing available", hasScore: true, hasAudio: true },
  { title: "Glass Topography", subtitle: "for solo piano", year: 2022, duration: "8:20", tags: {character:["Reflective"],tonality:["Atonal"],tempo:["Slow"],technique:["Extended"],instrumentation:["Solo"],difficulty:["Approachable"]}, license: "Purchase", hasScore: true, hasAudio: true },
  { title: "Pulse Garden", subtitle: "for percussion ensemble", year: 2022, duration: "11:00", tags: {character:["Energetic","Propulsive"],tonality:["Modal"],tempo:["Fast"],technique:["Rhythmic","Improvisation"],instrumentation:["Chamber"],difficulty:["Intermediate"]}, license: "Licensing available", hasScore: true, hasAudio: true },
  { title: "Nocturne with Satellites", subtitle: "for violin and live electronics", year: 2021, duration: "9:40", tags: {character:["Mysterious","Sonorous"],tonality:["Tonal"],tempo:["Slow"],technique:["Electronics","Extended"],instrumentation:["Solo","Electronics"],difficulty:["Advanced"]}, license: "Purchase", hasScore: true, hasAudio: true },
  { title: "Threshold Music", subtitle: "for string quartet", year: 2020, duration: "16:00", tags: {character:["Reflective","Sonorous"],tonality:["Modal"],tempo:["Slow"],technique:[],instrumentation:["Chamber"],difficulty:["Intermediate"]}, license: "Licensing available", hasScore: true, hasAudio: true },
  { title: "Spectral Cartography", subtitle: "for ensemble and electronics", year: 2019, duration: "12:30", tags: {character:["Mysterious"],tonality:["Atonal"],tempo:["Varied"],technique:["Electronics"],instrumentation:["Chamber","Electronics"],difficulty:["Advanced"]}, license: "Score rental", hasScore: true, hasAudio: true }
];

var filterCategories = {
  character: ["Sonorous","Melodic","Reflective","Propulsive","Mysterious","Energetic"],
  tonality: ["Tonal","Atonal","Modal","Non-Western"],
  tempo: ["Slow","Medium","Fast","Varied"],
  technique: ["Extended","Improvisation","Rhythmic","Electronics"],
  instrumentation: ["Solo","Chamber","Orchestra","Voice","Electronics"],
  difficulty: ["Approachable","Intermediate","Advanced"]
};

var activeFilters = {};

// Build filter bar
var filterBar = document.getElementById('filterBar');
Object.keys(filterCategories).forEach(function(cat) {
  var group = document.createElement('div');
  group.className = 'filter-group';

  var btn = document.createElement('button');
  btn.className = 'filter-group-btn';
  btn.dataset.group = cat;
  btn.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    toggleDropdown(cat);
  });

  var dd = document.createElement('div');
  dd.className = 'filter-dropdown';
  dd.dataset.group = cat;

  filterCategories[cat].forEach(function(val) {
    var chip = document.createElement('button');
    chip.className = 'filter-chip';
    chip.dataset.cat = cat;
    chip.dataset.val = val;
    chip.textContent = val;
    chip.addEventListener('click', function(e) {
      e.stopPropagation();
      toggleFilter(cat, val, chip);
    });
    dd.appendChild(chip);
  });

  group.appendChild(btn);
  group.appendChild(dd);
  filterBar.appendChild(group);
});

function toggleDropdown(cat) {
  document.querySelectorAll('.filter-dropdown').forEach(function(d) {
    if (d.dataset.group !== cat) d.classList.remove('open');
  });
  var dd = document.querySelector('.filter-dropdown[data-group="' + cat + '"]');
  dd.classList.toggle('open');
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.filter-group')) {
    document.querySelectorAll('.filter-dropdown').forEach(function(d) { d.classList.remove('open'); });
  }
});

function toggleFilter(cat, val, chipEl) {
  if (!activeFilters[cat]) activeFilters[cat] = [];
  var idx = activeFilters[cat].indexOf(val);
  if (idx > -1) {
    activeFilters[cat].splice(idx, 1);
    chipEl.classList.remove('selected');
  } else {
    activeFilters[cat].push(val);
    chipEl.classList.add('selected');
  }
  updateGroupBtns();
  renderActiveFilters();
  filterAndRender();
}

function removeFilter(cat, val) {
  if (activeFilters[cat]) {
    var idx = activeFilters[cat].indexOf(val);
    if (idx > -1) activeFilters[cat].splice(idx, 1);
  }
  document.querySelectorAll('.filter-chip[data-cat="' + cat + '"][data-val="' + val + '"]').forEach(function(el) {
    el.classList.remove('selected');
  });
  updateGroupBtns();
  renderActiveFilters();
  filterAndRender();
}

function updateGroupBtns() {
  document.querySelectorAll('.filter-group-btn').forEach(function(btn) {
    var g = btn.dataset.group;
    btn.classList.toggle('has-active', activeFilters[g] && activeFilters[g].length > 0);
  });
}

function renderActiveFilters() {
  var container = document.getElementById('activeFilters');
  var html = '';
  Object.entries(activeFilters).forEach(function(entry) {
    var cat = entry[0], vals = entry[1];
    vals.forEach(function(v) {
      html += '<span class="active-tag" onclick="removeFilter(\'' + cat + '\',\'' + v + '\')">' + v + ' <span class="x">\u00d7</span></span>';
    });
  });
  container.innerHTML = html;
}

function generateWaveform() {
  var bars = '';
  for (var i = 0; i < 45; i++) {
    var h = Math.round(4 + Math.random() * 22);
    bars += '<div class="wave-bar" style="height:' + h + 'px"></div>';
  }
  return bars;
}

function filterAndRender() {
  var search = document.getElementById('searchInput').value.toLowerCase();
  var sortVal = document.getElementById('sortSelect').value;

  var filtered = compositions.filter(function(c) {
    if (search && c.title.toLowerCase().indexOf(search) === -1 && c.subtitle.toLowerCase().indexOf(search) === -1 && String(c.year).indexOf(search) === -1) return false;
    for (var cat in activeFilters) {
      if (activeFilters[cat].length > 0) {
        var compTags = c.tags[cat] || [];
        var match = false;
        for (var i = 0; i < activeFilters[cat].length; i++) {
          if (compTags.indexOf(activeFilters[cat][i]) > -1) { match = true; break; }
        }
        if (!match) return false;
      }
    }
    return true;
  });

  // Sort
  if (sortVal === 'newest') filtered.sort(function(a,b) { return b.year - a.year; });
  else if (sortVal === 'oldest') filtered.sort(function(a,b) { return a.year - b.year; });
  else if (sortVal === 'az') filtered.sort(function(a,b) { return a.title.localeCompare(b.title); });
  else if (sortVal === 'duration') filtered.sort(function(a,b) {
    var da = a.duration.split(':').reduce(function(m,s){ return parseInt(m)*60+parseInt(s); });
    var db = b.duration.split(':').reduce(function(m,s){ return parseInt(m)*60+parseInt(s); });
    return db - da;
  });

  renderCards(filtered);
}

function renderCards(comps) {
  var grid = document.getElementById('compGrid');
  grid.innerHTML = comps.map(function(c) {
    var allTags = [];
    Object.values(c.tags).forEach(function(vals) {
      vals.forEach(function(v) {
        allTags.push('<span class="card-tag">' + v + '</span>');
      });
    });

    var scoreLines = '';
    for (var i = 0; i < 5; i++) scoreLines += '<div class="score-line"></div>';

    return '<div class="comp-card">' +
      '<div class="card-header">' +
        '<div class="card-year">' + c.year + '</div>' +
        '<div class="card-title">' + c.title + '</div>' +
        '<div class="card-subtitle">' + c.subtitle + '</div>' +
        '<div class="card-meta"><span>' + c.duration + '</span></div>' +
      '</div>' +
      '<div class="card-tags">' + allTags.join('') + '</div>' +
      (c.hasAudio ? '<div class="card-audio">' +
        '<button class="play-btn"><div class="play-tri"></div></button>' +
        '<div class="waveform">' + generateWaveform() + '</div>' +
        '<span class="audio-dur">' + c.duration + '</span>' +
      '</div>' : '') +
      (c.hasScore ? '<div class="card-score-preview">' +
        '<div class="score-icon"><div class="score-lines">' + scoreLines + '</div></div>' +
        '<span>Score available</span>' +
        '<span class="license-badge">' + c.license + '</span>' +
      '</div>' : '') +
    '</div>';
  }).join('');

  document.getElementById('resultsCount').textContent = 'Showing ' + comps.length + ' composition' + (comps.length !== 1 ? 's' : '');
}

// Event listeners
document.getElementById('searchInput').addEventListener('input', filterAndRender);
document.getElementById('sortSelect').addEventListener('change', filterAndRender);

// Initial render
filterAndRender();
</script>
</body>
</html>
